name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_images:
        description: "Build Docker images without running services"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

  tests:
    name: Tests
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      POSTGRES_DB: news_flow
      POSTGRES_USER: news_flow
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      RABBITMQ_USER: news_flow
      RABBITMQ_PASSWORD: test_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_VHOST: /
      NEWS_VECTORIZATION_QUEUE: news_vectorization.jobs
      USE_LOCAL_MODEL: "false"
      LOCAL_MODEL_SOURCE: /tmp/news-flow-ru-vectorization-mpnet/final
      REMOTE_MODEL_SOURCE: configs/model_registry/latest_model.json
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config --quiet

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - tests
      - compose-config
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_images }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          tags: news-flow-api:ci

      - name: Build model service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/model-service.Dockerfile
          push: false
          tags: news-flow-model-service:ci
