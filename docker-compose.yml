services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-news_flow}
      POSTGRES_USER: ${POSTGRES_USER:-news_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-news_flow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-news_flow}
      POSTGRES_USER: ${POSTGRES_USER:-news_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-news_flow}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      NEWS_VECTORIZATION_QUEUE: ${NEWS_VECTORIZATION_QUEUE:-news_vectorization.jobs}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  model-service:
    image: news-flow-model-service:local
    build:
      context: .
      dockerfile: docker/model-service.Dockerfile
      args:
        PRELOAD_MODEL_FROM_HF: ${PRELOAD_MODEL_FROM_HF:-false}
        HF_MODEL_ID: ${HF_MODEL_ID:-Korprus/news-flow-ru-vectorization-mpnet}
        HF_MODEL_REVISION: ${HF_MODEL_REVISION:-789ab95331d9abc4f5f23d1e3d5d24bb8af28086}
        HF_MODEL_DIR: ${HF_MODEL_DIR:-/app/models/news-flow-ru-vectorization-mpnet/final}
        HF_MODEL_METADATA_PATH: ${HF_MODEL_METADATA_PATH:-/app/configs/model_registry/latest_model.json}
    environment:
      APP_ENV: ${APP_ENV:-local}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-news_flow}
      POSTGRES_USER: ${POSTGRES_USER:-news_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-news_flow}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      NEWS_VECTORIZATION_QUEUE: ${NEWS_VECTORIZATION_QUEUE:-news_vectorization.jobs}
      USE_LOCAL_MODEL: ${USE_LOCAL_MODEL:-false}
      LOCAL_MODEL_SOURCE: ${LOCAL_MODEL_SOURCE:-/app/local_models/news-flow-ru-vectorization-mpnet/final}
      REMOTE_MODEL_SOURCE: ${REMOTE_MODEL_SOURCE:-/app/configs/model_registry/latest_model.json}
      HF_HOME: ${MODEL_SERVICE_HF_HOME:-/app/.cache/huggingface}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./src:/app/src
      - ./artifacts:/app/artifacts
      - ./models:/app/local_models:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    environment:
      API_BASE_URL: http://nginx/api
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "8501"
    volumes:
      - ./ui:/app
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
