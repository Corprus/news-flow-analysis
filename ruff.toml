line-length = 100
target-version = "py311"
src = [
  "src",
  "tests",
  "ui",
]
extend-exclude = [
  "experiments",
]

[format]
preview = true

[lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
]

[lint.per-file-ignores]
"notebooks/*.ipynb" = [
  "E402", # Imports after setup/magic statements are normal in notebook cells.
  "E501", # Markdown and explanatory cells are not constrained to source line length.
  "F811", # Re-running/redefining helpers across experiment cells is intentional.
]

[lint.isort]
known-first-party = [
  "accounting",
  "api",
  "core",
  "db",
  "messaging",
  "model_service",
  "news",
  "services",
  "settings",
  "users",
]
