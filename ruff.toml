line-length = 100
target-version = "py311"
src = [
  "src",
  "tests",
  "ui",
]
extend-exclude = [
  "experiments",
]

[lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
]

[lint.isort]
known-first-party = [
  "accounting",
  "api",
  "core",
  "db",
  "messaging",
  "model_registry",
  "model_service",
  "news",
  "services",
  "settings",
  "users",
]
